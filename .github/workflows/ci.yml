name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Production dependency audit
        run: pnpm audit:prod

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust advisory audit
        run: pnpm rust:audit

      - name: Rust tests
        run: pnpm rust:test

      - name: Rust clippy
        run: pnpm rust:clippy

      - name: Desktop package build
        run: pnpm desktop:build
