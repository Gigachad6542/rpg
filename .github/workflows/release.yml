name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Candidate requires previous-version migration; bootstrap creates a signed prerelease baseline only"
        required: true
        default: candidate
        type: choice
        options:
          - candidate
          - bootstrap-baseline
      previous_release_tag:
        description: "Previous signed release used for packaged migration proof (defaults to latest stable release)"
        required: false
        type: string
      bootstrap_confirmation:
        description: "For bootstrap-baseline only, enter CREATE SIGNED BASELINE"
        required: false
        type: string

permissions:
  actions: read
  attestations: write
  artifact-metadata: write
  contents: read
  id-token: write

jobs:
  release-intent:
    name: Validate release intent and attestation capability
    runs-on: ubuntu-latest
    steps:
      - name: Fail closed on invalid bootstrap or unsupported attestation storage
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          RELEASE_MODE: ${{ inputs.release_mode }}
          BOOTSTRAP_CONFIRMATION: ${{ inputs.bootstrap_confirmation }}
        with:
          script: |
            const mode = process.env.RELEASE_MODE || "candidate";
            if (mode === "bootstrap-baseline") {
              if (context.eventName !== "workflow_dispatch") {
                core.setFailed("Bootstrap baseline creation is manual-only.");
                return;
              }
              if (process.env.BOOTSTRAP_CONFIRMATION !== "CREATE SIGNED BASELINE") {
                core.setFailed("Bootstrap baseline creation requires the exact CREATE SIGNED BASELINE confirmation.");
                return;
              }
              if (context.ref !== `refs/heads/${context.payload.repository.default_branch}`) {
                core.setFailed("Bootstrap baseline creation must run from the repository default branch.");
                return;
              }
              core.warning("A bootstrap baseline is not migration proof and must never be promoted as a public-ready release.");
            }

            const { owner, repo } = context.repo;
            const repository = await github.rest.repos.get({ owner, repo });
            if (repository.data.private && repository.data.owner.type === "User") {
              core.setFailed(
                "GitHub artifact attestations for private repositories require Enterprise Cloud. " +
                "Make the repository public, transfer it to an eligible organization, or adopt an approved alternate attestation backend before release.",
              );
            }

  hosted-ci-gate:
    name: Require successful hosted CI for exact release commit
    needs: release-intent
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Verify exact commit CI conclusion
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "ci.yml",
              head_sha: context.sha,
              status: "completed",
              per_page: 100,
            });
            const successful = response.data.workflow_runs.find(
              (run) => run.head_sha === context.sha && run.conclusion === "success",
            );
            if (!successful) {
              core.setFailed(`No successful ci.yml run exists for exact release commit ${context.sha}.`);
              return;
            }
            core.notice(`Release commit ${context.sha} passed hosted CI in run ${successful.id}.`);

  windows-desktop-release:
    needs: hosted-ci-gate
    runs-on: windows-latest

    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@8fae6aadcd3e1a6f3fcb446ce7f9438c9d1349f1 # 1.94.1
        with:
          components: clippy

      - name: Import Windows signing certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
          WINDOWS_PUBLISHER_SUBJECT: ${{ vars.WINDOWS_PUBLISHER_SUBJECT }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_BASE64 -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "Windows signing certificate secrets are required."
          }
          if (-not $env:WINDOWS_TIMESTAMP_URL) {
            throw "Repository variable WINDOWS_TIMESTAMP_URL is required."
          }
          if (-not $env:WINDOWS_PUBLISHER_SUBJECT) {
            throw "Repository variable WINDOWS_PUBLISHER_SUBJECT is required."
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "release-certificate.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          try {
            $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
            $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password
            if (-not $certificate -or -not $certificate.HasPrivateKey) {
              throw "Imported Windows certificate has no private key."
            }
            if (-not [string]::Equals($certificate.Subject, $env:WINDOWS_PUBLISHER_SUBJECT, [System.StringComparison]::Ordinal)) {
              throw "Imported Windows certificate subject '$($certificate.Subject)' does not match trusted publisher '$env:WINDOWS_PUBLISHER_SUBJECT'."
            }
            "TAURI_WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "TAURI_WINDOWS_TIMESTAMP_URL=$env:WINDOWS_TIMESTAMP_URL" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "RELEASE_WINDOWS_PUBLISHER_SUBJECT=$env:WINDOWS_PUBLISHER_SUBJECT" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } finally {
            Remove-Item -LiteralPath $certificatePath -Force -ErrorAction SilentlyContinue
          }

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version sync
        run: pnpm verify:version

      - name: Install Playwright Chromium
        run: pnpm e2e:install

      - name: Verify signed Windows release candidate
        env:
          REQUIRE_SIGNED_RELEASE: "1"
        run: pnpm verify:release

      - name: Verify Authenticode signatures
        shell: pwsh
        run: |
          ./scripts/verify-windows-signatures.ps1 `
            -BundleRoot "src-tauri/target/release/bundle" `
            -EvidenceDir "release-evidence/windows/signatures" `
            -ExpectedPublisherSubject "$env:RELEASE_WINDOWS_PUBLISHER_SUBJECT"

      - name: Download previous signed release chain
        if: ${{ inputs.release_mode != 'bootstrap-baseline' }}
        id: previous-release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_PREVIOUS_TAG: ${{ inputs.previous_release_tag }}
        run: |
          $tag = $env:REQUESTED_PREVIOUS_TAG
          if (-not $tag) {
            $releases = gh release list --limit 100 --json tagName,isDraft,isPrerelease,publishedAt | ConvertFrom-Json
            $tag = $releases |
              Where-Object { -not $_.isDraft -and -not $_.isPrerelease -and $_.tagName -ne $env:GITHUB_REF_NAME } |
              Sort-Object publishedAt -Descending |
              Select-Object -First 1 -ExpandProperty tagName
          }
          if (-not $tag) {
            throw "A previous signed stable release is required for packaged migration proof."
          }
          $release = gh release view $tag --json tagName,isDraft,isPrerelease | ConvertFrom-Json
          if ($release.isDraft) { throw "Previous release $tag is still a draft." }
          if ($release.isPrerelease -and -not $env:REQUESTED_PREVIOUS_TAG) {
            throw "Automatically selected previous release $tag must not be a prerelease."
          }
          $target = Join-Path $env:RUNNER_TEMP "previous-release"
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          gh release download $tag `
            --pattern "*.msi" `
            --pattern "SHA256SUMS-windows.txt" `
            --pattern "release-provenance-windows.json" `
            --dir $target
          $msiFiles = @(Get-ChildItem -LiteralPath $target -File -Filter "*.msi")
          if ($msiFiles.Count -ne 1) { throw "Previous release $tag must contain exactly one MSI; found $($msiFiles.Count)." }
          $checksum = Get-Item -LiteralPath (Join-Path $target "SHA256SUMS-windows.txt")
          $provenance = Get-Item -LiteralPath (Join-Path $target "release-provenance-windows.json")
          $tagCommit = gh api "repos/$env:GITHUB_REPOSITORY/commits/$tag" --jq .sha
          if ($LASTEXITCODE -ne 0 -or $tagCommit -notmatch '^[a-fA-F0-9]{40}$') {
            throw "Could not resolve previous release tag $tag to an exact commit."
          }
          $msi = $msiFiles[0]
          "previous_msi=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "previous_checksums=$($checksum.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "previous_provenance=$($provenance.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "previous_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "previous_commit=$($tagCommit.ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Verify previous release Authenticode signer and timestamp
        if: ${{ inputs.release_mode != 'bootstrap-baseline' }}
        shell: pwsh
        run: |
          ./scripts/verify-previous-windows-signature.ps1 `
            -MsiPath "${{ steps.previous-release.outputs.previous_msi }}" `
            -ExpectedPublisherSubject "$env:RELEASE_WINDOWS_PUBLISHER_SUBJECT" `
            -EvidenceDir "release-evidence/windows/previous-release"

      - name: Verify previous release checksums, provenance, version and tag commit
        if: ${{ inputs.release_mode != 'bootstrap-baseline' }}
        shell: pwsh
        run: |
          $currentVersion = (Get-Content -LiteralPath "package.json" -Raw | ConvertFrom-Json).version
          node scripts/verify-previous-release-metadata.mjs `
            --msi "${{ steps.previous-release.outputs.previous_msi }}" `
            --checksums "${{ steps.previous-release.outputs.previous_checksums }}" `
            --provenance "${{ steps.previous-release.outputs.previous_provenance }}" `
            --previous-tag "${{ steps.previous-release.outputs.previous_tag }}" `
            --current-version $currentVersion `
            --expected-repository "$env:GITHUB_REPOSITORY" `
            --expected-source-commit "${{ steps.previous-release.outputs.previous_commit }}" `
            --output "release-evidence/windows/previous-release/previous-release-verification.json"

      - name: Run previous-version migration and complete packaged product flow
        if: ${{ inputs.release_mode != 'bootstrap-baseline' }}
        shell: pwsh
        run: |
          $currentMsi = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File -Filter "*.msi" | Select-Object -First 1
          if (-not $currentMsi) { throw "Current release did not produce an MSI." }
          pnpm desktop:product-flow `
            -PreviousMsi "${{ steps.previous-release.outputs.previous_msi }}" `
            -CurrentMsi $currentMsi.FullName `
            -EvidenceDir "release-evidence/windows/product-flow"

      - name: Record bootstrap baseline scope
        if: ${{ inputs.release_mode == 'bootstrap-baseline' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release-evidence/windows/bootstrap" | Out-Null
          [ordered]@{
            schema = "rpg.release.bootstrap-baseline"
            version = 1
            status = "baseline-only"
            sourceCommit = $env:GITHUB_SHA
            statement = "A bootstrap baseline is not migration proof and is not a public-ready release."
          } | ConvertTo-Json | Set-Content -LiteralPath "release-evidence/windows/bootstrap/bootstrap-baseline.json" -Encoding utf8

      - name: Generate CycloneDX SBOM
        run: pnpm release:sbom -- --output release-evidence/windows/sbom-windows.cdx.json

      - name: Create checksummed Windows provenance
        env:
          RELEASE_COMMIT: ${{ github.sha }}
        run: pnpm release:provenance -- --platform windows --bundle-root src-tauri/target/release/bundle --sbom release-evidence/windows/sbom-windows.cdx.json --output-dir src-tauri/target/release/bundle

      - name: Attest Windows artifacts and SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          sbom-path: release-evidence/windows/sbom-windows.cdx.json

      - name: Upload Windows desktop artifacts and evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: local-first-rpg-windows
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/SHA256SUMS-windows.txt
            src-tauri/target/release/bundle/release-provenance-windows.json
            release-evidence/windows/**
          if-no-files-found: error
          retention-days: 90

  macos-desktop-release:
    needs: hosted-ci-gate
    runs-on: macos-latest

    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@8fae6aadcd3e1a6f3fcb446ce7f9438c9d1349f1 # 1.94.1
        with:
          components: clippy
          targets: aarch64-apple-darwin

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version sync
        run: pnpm verify:version

      - name: Install Playwright Chromium
        run: pnpm e2e:install

      - name: Verify signed, notarized and stapled macOS release candidate
        env:
          REQUIRE_SIGNED_RELEASE: "1"
          TAURI_BUILD_TARGET: aarch64-apple-darwin
          EVIDENCE_DIR: ${{ github.workspace }}/release-evidence/macos/dmg
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm verify:release:mac

      - name: Run native macOS Keychain round trip
        env:
          PHASE2_KEYCHAIN_SMOKE: "1"
        run: |
          mkdir -p release-evidence/macos/keychain
          pnpm desktop:keychain-smoke:mac 2>&1 | tee release-evidence/macos/keychain/keychain-round-trip.txt

      - name: Validate notarization ticket and Gatekeeper acceptance
        run: |
          dmg="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg"
          mkdir -p release-evidence/macos/notarization
          xcrun stapler validate "$dmg" 2>&1 | tee release-evidence/macos/notarization/stapler-validate.txt
          spctl -a -vv -t install "$dmg" 2>&1 | tee release-evidence/macos/notarization/gatekeeper-dmg.txt

      - name: Generate CycloneDX SBOM
        run: pnpm release:sbom -- --output release-evidence/macos/sbom-macos.cdx.json

      - name: Create checksummed macOS provenance
        env:
          RELEASE_COMMIT: ${{ github.sha }}
        run: pnpm release:provenance -- --platform macos --bundle-root src-tauri/target/release/bundle/dmg --sbom release-evidence/macos/sbom-macos.cdx.json --output-dir src-tauri/target/release/bundle/dmg

      - name: Attest macOS DMG and SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: src-tauri/target/release/bundle/dmg/*.dmg
          sbom-path: release-evidence/macos/sbom-macos.cdx.json

      - name: Upload macOS desktop artifacts and evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: local-first-rpg-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/SHA256SUMS-macos.txt
            src-tauri/target/release/bundle/dmg/release-provenance-macos.json
            release-evidence/macos/**
          if-no-files-found: error
          retention-days: 90

  publish-release:
    needs:
      - hosted-ci-gate
      - windows-desktop-release
      - macos-desktop-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download verified platform artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets

      - name: Publish exact-commit signed release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifacts = Get-ChildItem -Path "release-assets" -Recurse -File |
            Where-Object { $_.Extension -in @(".msi", ".exe", ".dmg") }
          $metadata = Get-ChildItem -Path "release-assets" -Recurse -File |
            Where-Object { $_.Name -like "SHA256SUMS-*.txt" -or $_.Name -like "release-provenance-*.json" -or $_.Name -like "sbom-*.cdx.json" }
          if (-not $artifacts -or ($metadata | Where-Object Name -like "SHA256SUMS-*.txt").Count -ne 2) {
            throw "Both signed platform artifact sets and checksum manifests are required."
          }
          $releaseFiles = @($artifacts | ForEach-Object { $_.FullName }) + @($metadata | ForEach-Object { $_.FullName })
          $title = "Local-First RPG $env:GITHUB_REF_NAME"
          gh release create $env:GITHUB_REF_NAME $releaseFiles --generate-notes --title $title --verify-tag

  publish-bootstrap-baseline:
    needs:
      - hosted-ci-gate
      - windows-desktop-release
      - macos-desktop-release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode == 'bootstrap-baseline' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout exact baseline commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}

      - name: Download verified platform artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets

      - name: Publish exact-commit signed bootstrap prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content -LiteralPath "package.json" -Raw | ConvertFrom-Json).version
          $tag = "v$version"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $tag already exists; refusing to overwrite a baseline."
          }
          $artifacts = Get-ChildItem -Path "release-assets" -Recurse -File |
            Where-Object { $_.Extension -in @(".msi", ".exe", ".dmg") }
          $metadata = Get-ChildItem -Path "release-assets" -Recurse -File |
            Where-Object {
              $_.Name -like "SHA256SUMS-*.txt" -or
              $_.Name -like "release-provenance-*.json" -or
              $_.Name -like "sbom-*.cdx.json" -or
              $_.Name -eq "bootstrap-baseline.json"
            }
          if (-not $artifacts -or ($metadata | Where-Object Name -like "SHA256SUMS-*.txt").Count -ne 2) {
            throw "Both signed platform artifact sets and checksum manifests are required."
          }
          $releaseFiles = @($artifacts | ForEach-Object { $_.FullName }) + @($metadata | ForEach-Object { $_.FullName })
          gh release create $tag $releaseFiles `
            --target $env:GITHUB_SHA `
            --prerelease `
            --title "Local-First RPG $tag signed migration baseline" `
            --notes "Signed bootstrap baseline only. This release has no previous-version migration proof and must not be promoted as public-ready."
