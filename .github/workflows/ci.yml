name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@8fae6aadcd3e1a6f3fcb446ce7f9438c9d1349f1 # 1.94.1
        with:
          components: clippy

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm e2e:install

      - name: Version sync
        run: pnpm verify:version

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build frontend
        run: pnpm build

      - name: Browser acceptance tests
        run: pnpm e2e

      - name: Production dependency audit
        run: pnpm audit:prod

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust advisory audit
        run: pnpm rust:audit

      - name: Rust tests
        run: pnpm rust:test

      - name: Rust clippy
        run: pnpm rust:clippy

      - name: Desktop package build
        run: pnpm desktop:build

      - name: Desktop executable smoke
        run: pnpm desktop:smoke

      - name: Desktop MSI payload smoke
        run: pnpm desktop:installed-smoke

      - name: Normal Windows installer lifecycle
        run: pnpm desktop:installer-lifecycle

      - name: Retain Windows installer lifecycle evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-installer-lifecycle-evidence
          path: release-evidence/windows/installer-lifecycle/**
          if-no-files-found: warn
          retention-days: 30

  verify-macos:
    name: Verify macOS compatibility
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@8fae6aadcd3e1a6f3fcb446ce7f9438c9d1349f1 # 1.94.1
        with:
          components: clippy

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Version sync
        run: pnpm verify:version

      - name: Unit tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Rust tests
        run: pnpm rust:test

      - name: Rust clippy
        run: pnpm rust:clippy
