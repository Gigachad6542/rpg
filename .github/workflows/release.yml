name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-desktop-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm e2e:install

      - name: Verify release candidate
        run: pnpm verify:release

      - name: Create checksum manifest
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          $files = Get-ChildItem -Path $bundleRoot -Recurse -File -Include *.msi,*.exe
          if (-not $files) {
            throw "No Windows installer artifacts found under $bundleRoot"
          }
          $files | Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $(Split-Path -Leaf $_.Path)" } |
            Set-Content -Path "$bundleRoot/SHA256SUMS.txt" -Encoding utf8

      - name: Upload Windows desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: local-first-ai-rpg-runtime-windows
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          $artifacts = Get-ChildItem -Path $bundleRoot -Recurse -File -Include *.msi,*.exe
          $checksum = Join-Path $bundleRoot "SHA256SUMS.txt"
          $releaseFiles = @($artifacts | ForEach-Object { $_.FullName }) + @($checksum)
          gh release create $env:GITHUB_REF_NAME $releaseFiles --generate-notes --title "Local-First AI RPG Runtime $env:GITHUB_REF_NAME"
